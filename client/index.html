    <!-- Dynamic Favicon Script -->
    <script>
      (function() {
        function updateFavicon() {
          const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const faviconPath = isDarkMode ? '/favicon.png' : '/favicon-black.png';
          
          // Update main favicon
          const favicon = document.getElementById('favicon');
          if (favicon) {
            favicon.href = faviconPath;
          }
          
          // Update shortcut icon
          const shortcutIcon = document.getElementById('shortcut-icon');
          if (shortcutIcon) {
            shortcutIcon.href = faviconPath;
          }
          
          // Update preload favicon
          const faviconPreload = document.getElementById('favicon-preload');
          if (faviconPreload) {
            faviconPreload.href = faviconPath;
          }
        }
        
        // Set initial favicon
        updateFavicon();
        
        // Listen for theme changes
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        mediaQuery.addListener(updateFavicon);
        
        // For newer browsers that support addEventListener
        if (mediaQuery.addEventListener) {
          mediaQuery.addEventListener('change', updateFavicon);
        }
      })();
    </script>
