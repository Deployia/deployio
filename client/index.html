<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Primary Meta Tags -->
    <title>Deployio</title>
    <meta
      name="title"
      content="Deployio - AI-Powered DevOps Automation Platform | Intelligent Deployment Solutions"
    />
    <meta
      name="description"
      content="Transform your deployment process with Deployio's AI-powered automation. Submit a GitHub URL and get instant stack detection, Dockerfiles, CI/CD pipelines, and production deployments with real-time monitoring."
    />
    <meta
      name="keywords"
      content="AI DevOps automation, intelligent deployment, automated CI/CD, GitHub deployment, Docker generation, MERN stack deployment, cloud deployment automation, DevOps platform, deployment pipeline, infrastructure automation"
    />
    <meta name="author" content="Deployio Team" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />

    <!-- Theme and App Meta -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="msapplication-TileColor" content="#3b82f6" />
    <meta name="msapplication-navbutton-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://deployio.com/" />
    <meta
      property="og:title"
      content="Deployio - AI-Powered DevOps Automation Platform | Intelligent Deployment Solutions"
    />
    <meta
      property="og:description"
      content="Transform your deployment process with Deployio's AI-powered automation. Submit a GitHub URL and get instant stack detection, Dockerfiles, CI/CD pipelines, and production deployments with real-time monitoring."
    />
    <meta property="og:image" content="https://deployio.com/og-image.jpg" />
    <meta property="og:site_name" content="Deployio" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://deployio.com/" />
    <meta
      property="twitter:title"
      content="Deployio - AI-Powered DevOps Automation Platform | Intelligent Deployment Solutions"
    />
    <meta
      property="twitter:description"
      content="Transform your deployment process with Deployio's AI-powered automation. Submit a GitHub URL and get instant stack detection, Dockerfiles, CI/CD pipelines, and production deployments with real-time monitoring."
    />
    <meta
      property="twitter:image"
      content="https://deployio.com/og-image.jpg"
    />
    <meta property="twitter:site" content="@deployio" />
    <meta property="twitter:creator" content="@deployio" />

    <!-- Icons and Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://deployio.com/" />

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS Prefetch for Performance -->
    <link rel="dns-prefetch" href="//api.deployio.com" />

    <!-- Structured Data for Search Engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Deployio",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",

        "url": "https://deployio.tech",
        "author": {
          "@type": "Organization",
          "name": "Deployio Team"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "reviewCount": "150"
        }
      }
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
