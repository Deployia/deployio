# This is the Nginx configuration for DEVELOPMENT
# It typically doesn't handle SSL termination, as that's complex for local dev.
# If you need HTTPS in local dev, consider mkcert or similar tools.

server {
    listen 80;
    server_name localhost; # Or your local dev domain if you use one

    # Frontend (React/Vite dev server)
    location / {
        proxy_pass http://frontend:5173; # Vite dev server default port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade; # Required for WebSocket connections (Vite HMR)
        proxy_set_header Connection "upgrade";    # Required for WebSocket connections (Vite HMR)
    }

    # API Backend (Node.js)
    location /api/ {
        proxy_pass http://backend-node:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Backend (FastAPI)
    location /services/ {
        proxy_pass http://backend-fastapi:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
