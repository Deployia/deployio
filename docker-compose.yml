services:
  traefik:
    image: traefik:v3.0
    container_name: deployio-traefik
    ports:
      - "127.0.0.1:4567:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - web
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      args:
        VITE_APP_ENV: production
        VITE_APP_BACKEND_URL: https://api.deployio.tech
        VITE_APP_FASTAPI_URL: https://ai.deployio.tech/service/v1
    image: deployio/frontend:local
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`deployio.tech`) || Host(`www.deployio.tech`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    depends_on:
      traefik:
        condition: service_started
      backend:
        condition: service_started
      ai-service:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./server
    image: deployio/backend:local
    user: "1001:1001"
    env_file:
      - ./server/.env.production
    volumes:
      - ./server/logs:/app/logs
      - ./ai-service/logs:/shared-logs
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.deployio.tech`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

  ai-service:
    build:
      context: ./ai-service
    image: deployio/ai-service:local
    user: "1001:1001"
    env_file:
      - ./ai-service/.env.production
    volumes:
      - ./ai-service/logs:/app/logs
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=Host(`ai.deployio.tech`) || Host(`service.deployio.tech`)"
      - "traefik.http.routers.ai.entrypoints=web"
      - "traefik.http.services.ai.loadbalancer.server.port=8000"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/service/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  agent:
    build:
      context: ./agent
    image: deployio/agent:local
    user: "1001:1001"
    group_add:
      - "${DOCKER_GID:-998}"
    env_file:
      - ./agent/.env.production
    environment:
      - AGENT_SECRET=${AGENT_SECRET:-development-secret-change-in-production}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agent/logs:/app/logs
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent.rule=Host(`agent.deployio.tech`)"
      - "traefik.http.routers.agent.entrypoints=web"
      - "traefik.http.services.agent.loadbalancer.server.port=8000"
    depends_on:
      traefik:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/agent/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:alpine
    command: redis-server
    volumes:
      - redis_data:/data
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  redis_data:
    driver: local

networks:
  web:
    driver: bridge
