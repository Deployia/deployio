services:
  traefik:
    image: traefik:v2.9
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.docker
      - --providers.docker.exposedByDefault=false
      - --api.dashboard=false
      - --certificatesresolvers.myresolver.acme.tlschallenge=true
      - --certificatesresolvers.myresolver.acme.email=admin@deployio.tech
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - web
    restart: unless-stopped

  frontend:
    image: 533266971626.dkr.ecr.ap-south-1.amazonaws.com/deployio-frontend:latest
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`deployio.tech`,`www.deployio.tech`) && PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.routers.frontend.tls.domains[0].main=deployio.tech"
      - "traefik.http.routers.frontend.tls.domains[0].sans=www.deployio.tech"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend.priority=1"
    networks:
      - web
    depends_on:
      backend:
        condition: service_started
      ai-service:
        condition: service_started
    restart: unless-stopped

  backend:
    image: 533266971626.dkr.ecr.ap-south-1.amazonaws.com/deployio-backend:latest
    env_file:
      - ./server/.env.production
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`deployio.tech`,`www.deployio.tech`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=myresolver"
      - "traefik.http.routers.backend.tls.domains[0].main=deployio.tech"
      - "traefik.http.routers.backend.tls.domains[0].sans=www.deployio.tech"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"
      - "traefik.http.routers.backend.priority=2"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - web
    restart: unless-stopped

  ai-service:
    image: 533266971626.dkr.ecr.ap-south-1.amazonaws.com/deployio-ai-service:latest
    env_file:
      - ./ai-service/.env.production
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-service.rule=Host(`deployio.tech`,`www.deployio.tech`) && PathPrefix(`/service`)"
      - "traefik.http.routers.ai-service.entrypoints=websecure"
      - "traefik.http.routers.ai-service.tls.certresolver=myresolver"
      - "traefik.http.routers.ai-service.tls.domains[0].main=deployio.tech"
      - "traefik.http.routers.ai-service.tls.domains[0].sans=www.deployio.tech"
      - "traefik.http.services.ai-service.loadbalancer.server.port=8000"
      - "traefik.http.routers.ai-service.priority=2"
    networks:
      - web
    restart: unless-stopped

  redis:
    image: redis:alpine
    command: redis-server
    volumes:
      - redis_data:/data
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:
    driver: local
  letsencrypt:
    driver: local

networks:
  web:
    driver: bridge
