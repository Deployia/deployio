version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend-node # Assuming your existing backend is Node.js
      - backend-fastapi
    restart: unless-stopped
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: certbot_service
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: frontend_app
    expose:
      - "80" # For production (Nginx serving static files from client/Dockerfile)
      # - "5173" # For development (Vite dev server, uncomment and update nginx.conf)
    # environment:
    # VITE_API_BASE_URL is expected from .env.prod file
    # env_file:
    # - ./client/.env.prod # Removed .env.prod reference
    restart: unless-stopped
    networks:
      - app-network

  backend-node: # Your existing Node.js backend
    build:
      context: ./server
      dockerfile: Dockerfile # Ensure this Dockerfile installs devDependencies (e.g., use 'npm install' instead of 'npm ci --only=production')
    container_name: backend_node_app
    # environment:
    # NODE_ENV, PORT, MONGODB_URI are expected from .env.prod file
    # env_file:
    # - ./server/.env.prod # Removed .env.prod reference
    expose:
      - "3000"
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - app-network

  backend-fastapi:
    build:
      context: ./service # Updated context from fastapi_server to service
      dockerfile: Dockerfile
    container_name: backend_fastapi_app
    # environment:
    # PORT, MONGODB_URI are expected from .env.prod file
    # env_file:
    # - ./service/.env.prod # Removed .env.prod reference
    expose:
      - "8000"

  mongo:
    image: mongo:latest
    container_name: mongodb
    volumes:
      - mongo-data:/data/db
    expose:
      - "27017"
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
