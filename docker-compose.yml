services:
  frontend:
    build:
      context: ./client
      args:
        VITE_APP_ENV: production
        VITE_APP_BACKEND_URL: https://api.deployio.tech
        VITE_APP_FASTAPI_URL: https://ai.deployio.tech/service/v1
    image: deployio/frontend:local
    ports:
      - "127.0.0.1:4100:80"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    networks:
      - web
    depends_on:
      backend:
        condition: service_started
      ai-service:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./server
    image: deployio/backend:local
    env_file:
      - ./server/.env.production
    ports:
      - "127.0.0.1:4300:3000"
    volumes:
      - ./server/logs:/app/logs
      - ./ai-service/logs:/shared-logs
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

  ai-service:
    build:
      context: ./ai-service
    image: deployio/ai-service:local
    env_file:
      - ./ai-service/.env.production
    ports:
      - "127.0.0.1:4800:8000"
    volumes:
      - ./ai-service/logs:/app/logs
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    networks:
      - web
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/service/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:alpine
    command: redis-server
    volumes:
      - redis_data:/data
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  redis_data:
    driver: local

networks:
  web:
    driver: bridge
