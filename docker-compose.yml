version: "3.8"

services:
  traefik:
    image: traefik:v2.9
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.docker
      - --providers.docker.exposedByDefault=false
      # Use TLS-ALPN-01 challenge on port 443 for ACME
      - --certificatesresolvers.myresolver.acme.tlschallenge=true
      - --certificatesresolvers.myresolver.acme.email=admin@deployio.tech
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - web

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`deployio.tech`) && PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend.priority=1"
    networks:
      - web
    depends_on:
      - backend
    env_file:
      - ./client/.env

  backend:
    build: .
    env_file:
      - ./.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`deployio.tech`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=myresolver"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"
      - "traefik.http.routers.backend.priority=2"
    depends_on:
      - mongodb
    networks:
      - web

  fastapi:
    build:
      context: ./fastapi_service
      dockerfile: Dockerfile
    env_file:
      - ./fastapi_service/.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastapi.rule=Host(`deployio.tech`) && PathPrefix(`/service`)"
      - "traefik.http.routers.fastapi.entrypoints=websecure"
      - "traefik.http.routers.fastapi.tls.certresolver=myresolver"
      - "traefik.http.services.fastapi.loadbalancer.server.port=8000"
      - "traefik.http.routers.fastapi.priority=2"
    networks:
      - web
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    volumes:
      - mongodb_data:/data/db
    networks:
      - web

volumes:
  letsencrypt:
  mongodb_data:

networks:
  web:
    driver: bridge
