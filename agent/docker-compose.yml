services:
  # Traefik reverse proxy
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik:/dynamic:ro
      - ./letsencrypt:/letsencrypt
    environment:
      - TRAEFIK_API_DASHBOARD=true
      - TRAEFIK_API_INSECURE=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.deployio.tech`)"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
    networks:
      - deployio-network

  # DeployIO Agent API
  deployio-agent:
    image: ${ECR_IMAGE:-deployio-agent:local}
    container_name: deployio-agent
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent.rule=Host(`agent.deployio.tech`)"
      - "traefik.http.routers.agent.tls.certresolver=letsencrypt"
      - "traefik.http.services.agent.loadbalancer.server.port=8000"
    networks:
      - deployio-network
    depends_on:
      - traefik # Default Landing Page
  landing-page:
    build: ./landing-page
    container_name: landing-page
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Catch-all rule for any subdomain (reserved routes have higher priority)
      - "traefik.http.routers.landing.rule=HostRegexp(`^.+\\.deployio\\.tech$`)"
      - "traefik.http.routers.landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.landing.priority=1"
      - "traefik.http.services.landing.loadbalancer.server.port=80"
    networks:
      - deployio-network
    depends_on:
      - traefik

networks:
  deployio-network:
    external: false
    driver: bridge

volumes:
  letsencrypt_data:
    driver: local
