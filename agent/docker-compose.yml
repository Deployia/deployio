services:
  # Traefik reverse proxy
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik:/dynamic:ro
      - ./letsencrypt:/letsencrypt
    environment:
      - TRAEFIK_API_DASHBOARD=true
      - TRAEFIK_API_INSECURE=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.deployio.tech`)"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
    networks:
      - deployio-network

  # DeployIO Agent API
  deployio-agent:
    image: ${ECR_IMAGE:-deployio-agent:local}
    container_name: deployio-agent
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent.rule=Host(`agent.deployio.tech`)"
      - "traefik.http.routers.agent.tls.certresolver=letsencrypt"
      - "traefik.http.services.agent.loadbalancer.server.port=8000"
    networks:
      - deployio-network
    depends_on:
      - traefik

  # ── Example Apps (always running) ──────────────────────────────
  mern-example:
    image: deployio-mern-example:latest
    pull_policy: never
    container_name: mern-example
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mern-example.rule=Host(`mern.deployio.tech`)"
      - "traefik.http.routers.mern-example.entrypoints=websecure"
      - "traefik.http.routers.mern-example.tls=true"
      - "traefik.http.routers.mern-example.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mern-example.priority=5"
      - "traefik.http.services.mern-example.loadbalancer.server.port=3000"
      - "deployio.managed=true"
      - "deployio.app=mern"
    networks:
      - deployio-network
    depends_on:
      - traefik

  next-example:
    image: deployio-next-example:latest
    pull_policy: never
    container_name: next-example
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.next-example.rule=Host(`next.deployio.tech`)"
      - "traefik.http.routers.next-example.entrypoints=websecure"
      - "traefik.http.routers.next-example.tls=true"
      - "traefik.http.routers.next-example.tls.certresolver=letsencrypt"
      - "traefik.http.routers.next-example.priority=5"
      - "traefik.http.services.next-example.loadbalancer.server.port=3000"
      - "deployio.managed=true"
      - "deployio.app=next"
    networks:
      - deployio-network
    depends_on:
      - traefik

  fastapi-example:
    image: deployio-fastapi-example:latest
    pull_policy: never
    container_name: fastapi-example
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastapi-example.rule=Host(`fastapi.deployio.tech`)"
      - "traefik.http.routers.fastapi-example.entrypoints=websecure"
      - "traefik.http.routers.fastapi-example.tls=true"
      - "traefik.http.routers.fastapi-example.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fastapi-example.priority=5"
      - "traefik.http.services.fastapi-example.loadbalancer.server.port=8000"
      - "deployio.managed=true"
      - "deployio.app=fastapi"
    networks:
      - deployio-network
    depends_on:
      - traefik

  # Default Landing Page
  landing-page:
    build: ./landing-page
    container_name: landing-page
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Catch-all rule for any subdomain (reserved routes have higher priority)
      - "traefik.http.routers.landing.rule=HostRegexp(`^.+\\.deployio\\.tech$`)"
      - "traefik.http.routers.landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.landing.priority=1"
      - "traefik.http.services.landing.loadbalancer.server.port=80"
    networks:
      - deployio-network
    depends_on:
      - traefik

networks:
  deployio-network:
    external: false
    driver: bridge

volumes:
  letsencrypt_data:
    driver: local
