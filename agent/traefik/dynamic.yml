http:
  routers:
    # Agent API - Reserved subdomain
    agent-api:
      rule: "Host(`agent.deployio.tech`)"
      service: agent-service
      priority: 10
      tls:
        certResolver: letsencrypt
      middlewares:
        - agent-cors

    # App management interface - Reserved subdomain
    app-interface:
      rule: "Host(`app.deployio.tech`)"
      service: agent-service
      priority: 10
      tls:
        certResolver: letsencrypt
      middlewares:
        - agent-cors

    # Traefik Dashboard - Reserved subdomain
    traefik-dashboard:
      rule: "Host(`traefik.deployio.tech`)"
      service: "api@internal"
      priority: 10
      tls:
        certResolver: letsencrypt

  services:
    # DeployIO Agent service
    agent-service:
      loadBalancer:
        servers:
          - url: "http://deployio-agent:8000"

  middlewares:
    agent-cors:
      headers:
        accessControlAllowOriginList:
          - "https://deployio.tech"
          - "https://*.deployio.tech"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "*"

    landing-cors:
      headers:
        accessControlAllowOriginList:
          - "*"
        accessControlAllowMethods:
          - GET
          - OPTIONS
        accessControlAllowHeaders:
          - "*"
