http:
  routers:
    # Agent API - Reserved subdomain
    agent-api:
      rule: "Host(`agent.deployio.tech`)"
      service: agent-service
      priority: 10
      tls:
        certResolver: letsencrypt
      middlewares:
        - agent-cors

    # App management interface - Reserved subdomain
    app-interface:
      rule: "Host(`app.deployio.tech`)"
      service: agent-service
      priority: 10
      tls:
        certResolver: letsencrypt
      middlewares:
        - agent-cors

    # Traefik Dashboard - Reserved subdomain
    traefik-dashboard:
      rule: "Host(`traefik.deployio.tech`)"
      service: "api@internal"
      priority: 10
      tls:
        certResolver: letsencrypt

    # Smart landing page - Handles both regular and reserved subdomains
    smart-landing:
      rule: "HostRegexp(`{subdomain:[a-zA-Z0-9-]+}.deployio.tech`) && !Host(`agent.deployio.tech`) && !Host(`app.deployio.tech`) && !Host(`traefik.deployio.tech`)"
      service: landing-service
      priority: 5
      tls:
        certResolver: letsencrypt
      middlewares:
        - landing-cors

  services:
    # DeployIO Agent service
    agent-service:
      loadBalancer:
        servers:
          - url: "http://deployio-agent:8000"

    # Smart landing page service (handles both regular and reserved subdomains)
    landing-service:
      loadBalancer:
        servers:
          - url: "http://landing-page:80"

  middlewares:
    agent-cors:
      headers:
        accessControlAllowOriginList:
          - "https://deployio.tech"
          - "https://*.deployio.tech"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "*"

    landing-cors:
      headers:
        accessControlAllowOriginList:
          - "*"
        accessControlAllowMethods:
          - GET
          - OPTIONS
        accessControlAllowHeaders:
          - "*"
