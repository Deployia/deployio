services:
  nginx:
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf # Override to use dev Nginx config
      # Keep other volumes like certbot if needed, though certbot is less relevant for local dev
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot

  frontend:
    # The build context and Dockerfile are inherited from docker-compose.yml
    # We override the command and add volumes for live reloading.
    command: ["npm", "run", "dev", "--", "--host"] # Runs Vite dev server
    expose:
      - "5173" # Vite dev server port
    volumes:
      - ./client:/app
      - /app/node_modules # Prevents host node_modules from overwriting container's
    environment:
      # CHOKIDAR_USEPOLLING=true # Uncomment if HMR is not working reliably in Docker
      # VITE_API_BASE_URL is now expected from .env file
    env_file:
      - ./client/.env # Path relative to the docker-compose file

  backend-node:
    # Build context and Dockerfile inherited.
    # For dev, ensure your server/Dockerfile installs devDependencies (e.g., by using 'npm install'
    # or having a dev stage that includes them if you are not mounting node_modules from host)
    command: ["npm", "run", "dev"] # Assumes a "dev" script in server/package.json (e.g., "nodemon server.js")
    environment:
      - NODE_ENV=development # Override NODE_ENV for development
      # Other env vars like PORT, MONGODB_URI are expected from .env file
    env_file:
      - ./server/.env # Path relative to the docker-compose file
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules # Prevents host node_modules from overwriting container's

  backend-fastapi:
    # Build context and Dockerfile inherited.
    command: [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ] # Run with auto-reload
    # Environment variables like PORT, MONGODB_URI are expected from .env file
    env_file:
      - ./fastapi_server/.env # Path relative to the docker-compose file
    volumes:
      - ./fastapi_server:/app # Mount local code for live reload

# Certbot is typically not run in local development this way,
# as it requires a publicly accessible server and domain.
# You can comment it out or exclude it if not needed for your dev workflow.
