# Deployio Nginx reverse proxy configuration
# Place this in /etc/nginx/sites-available/deployio.conf and symlink to sites-enabled.
# Nginx terminates TLS and forwards traffic to local Traefik (port 4567).

upstream deployio_traefik {
    server 127.0.0.1:4567;
}

server {
    listen 80;
    server_name deployio.tech www.deployio.tech api.deployio.tech ai.deployio.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name deployio.tech www.deployio.tech api.deployio.tech ai.deployio.tech service.deployio.tech agent.deployio.tech;

    ssl_certificate /etc/letsencrypt/live/deployio.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deployio.tech/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://deployio_traefik;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
