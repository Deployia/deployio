services:
  traefik:
    image: traefik:v2.9
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.docker
      - --providers.docker.exposedByDefault=false
      - --api.dashboard=true
      - --certificatesresolvers.myresolver.acme.tlschallenge=true
      - --certificatesresolvers.myresolver.acme.email=admin@deployio.tech
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${BASE_DOMAIN:-deployio.tech}`)"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=myresolver"
    restart: unless-stopped
  deployio-agent:
    image: ${AGENT_IMAGE:-061446587946.dkr.ecr.ap-south-1.amazonaws.com/deployio-agent:latest}
    user: agent
    env_file:
      - ./.env.production
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    group_add:
      - docker
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --no-progress-meter --fail http://localhost:8000/agent/v1/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent.rule=Host(`agent.${BASE_DOMAIN:-deployio.tech}`)"
      - "traefik.http.services.agent.loadbalancer.server.port=8000"
      - "traefik.http.routers.agent.entrypoints=websecure"
      - "traefik.http.routers.agent.tls.certresolver=myresolver"
      - "traefik.http.routers.agent.priority=10"
    depends_on:
      - traefik
    networks:
      - web
    restart: unless-stopped

  wildcard:
    image: nginx:alpine
    read_only: true
    volumes:
      - ./wildcard-page:/usr/share/nginx/html:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wildcard.rule=HostRegexp(`{host:.+}.${BASE_DOMAIN:-deployio.tech}`)"
      - "traefik.http.routers.wildcard.priority=1"
      - "traefik.http.services.wildcard.loadbalancer.server.port=80"
      - "traefik.http.routers.wildcard.entrypoints=websecure"
      - "traefik.http.routers.wildcard.tls.certresolver=myresolver"
      - "traefik.http.routers.wildcard.tls.domains[0].main=${BASE_DOMAIN:-deployio.tech}"
      - "traefik.http.routers.wildcard.tls.domains[0].sans=*.${BASE_DOMAIN:-deployio.tech}"
    restart: unless-stopped

volumes:
  letsencrypt:
    driver: local

networks:
  web:
    driver: bridge
