name: Build and Deploy to EC2

on:
  push:
    branches:
      - main # Or your deployment branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 and Build Locally
        uses: appleboy/ssh-action@master
        with:
          host: deployio.tech
          username: vasudevshetty
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e 
            APP_PATH="/home/vasudevshetty/deployio" # IMPORTANT: Set this to your actual app path on EC2
            cd $APP_PATH

            echo "Fetching latest code from Git..."
            git checkout main # Or your specific deployment branch
            git pull origin main # Or your specific deployment branch

            echo "Stopping and removing old containers (if any)..."
            docker-compose -f docker-compose.yml down --remove-orphans

            echo "Building and starting new containers..."
            # This command will build images locally on the EC2 using Dockerfiles from the repo
            # and then start the services defined in your production docker-compose.yml.
            docker-compose -f docker-compose.prod.yml up --build -d

            echo "Cleaning up unused Docker images (optional)..."
            # Consider uncommenting the next line to save disk space on your EC2 instance
            # docker image prune -af

            echo "Deployment successful!"
