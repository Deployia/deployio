name: CI/CD Pipeline for DeployIO

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  DOCKER_BUILDKIT: 1

jobs:
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Node.js dependencies
        run: |
          npm ci
          cd client && npm ci

      - name: Install Python dependencies
        run: |
          cd fastapi_service
          pip install -r requirements.txt
          pip install pylint pytest black

      - name: Lint JavaScript/React
        run: |
          npm run lint || true
          cd client && npm run lint || true

      - name: Lint Python
        run: |
          cd fastapi_service
          pylint --rcfile=.pylintrc **/*.py || true
          black --check --diff . || true

  security-scan:
    name: Security Vulnerability Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Security audit for Node.js
        run: |
          npm audit --audit-level=moderate || true
          cd client && npm audit --audit-level=moderate || true

      - name: Python security scan with Bandit
        run: |
          pip install bandit
          cd fastapi_service
          bandit -r . -x tests/ || true

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password123
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test || true
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://admin:password123@localhost:27017/deployio_test?authSource=admin
          JWT_SECRET: test_jwt_secret_for_ci

  fastapi-tests:
    name: FastAPI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          cd fastapi_service
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run FastAPI tests
        run: |
          cd fastapi_service
          pytest tests/ -v --cov=. --cov-report=xml || true

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          cd client
          npm ci

      - name: Run frontend tests
        run: |
          cd client
          npm run test -- --coverage --watchAll=false || true

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      [
        code-quality,
        security-scan,
        backend-tests,
        fastapi-tests,
        frontend-tests,
      ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: deployio/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: ./fastapi_service
          file: ./fastapi_service/Dockerfile
          push: false
          tags: deployio/fastapi:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: deployio/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: deployio.tech
          username: vasudevshetty
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/deployio
            git fetch origin
            git checkout main
            git pull origin main

            # Backup current deployment
            docker-compose ps > /tmp/deployment-backup-$(date +%Y%m%d_%H%M%S).log

            # Use your existing working deployment process
            docker-compose down --remove-orphans
            docker-compose build --no-cache
            docker-compose up -d            # Health check using your working endpoints
            sleep 60
            if curl -f http://localhost:3000/api/v1/health && curl -f http://localhost:8000/service/v1/health; then
              echo "Health checks passed"
              docker system prune -f
            else
              echo "Health checks failed - rolling back"
              docker-compose down
              exit 1
            fi      - name: Verify deployment
        run: |
          sleep 120
          curl -f https://deployio.tech/api/v1/health || exit 1
          curl -f https://deployio.tech/service/v1/health || exit 1

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always()

    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "✅ DeployIO deployment successful!"
            echo "🌐 Production URL: https://deployio.tech"
          else
            echo "❌ DeployIO deployment failed!"
          fi
