name: Deploy Frontend and Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS and Build Docker Images
    runs-on: ubuntu-latest
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout Repository # Checks out repo in the Actions runner environment
        uses: actions/checkout@v3

      - name: Deploy to VPS
        env:
          # This REPO_URL is expanded by GitHub Actions and then used in the SSH script
          REPO_URL: "https://github.com/${{ github.repository }}.git"
        run: |
          echo "Setting up SSH key..."
          echo "$SSH_PRIVATE_KEY" > id_rsa_temp
          chmod 600 id_rsa_temp

          VPS_USER="vasudevshetty"
          VPS_HOST="server.fauxigent.com"
          # Define the project directory on the VPS
          PROJECT_DIR_ON_VPS="/home/$VPS_USER/projects/mern-template"

          echo "Connecting to $VPS_USER@$VPS_HOST and deploying..."
          # The heredoc marker is \\'EOF\\'
          ssh -i ./id_rsa_temp -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" "bash -s" << \\"EOF\\"
            set -e # Exit on any error

            # Variables received by the remote script (or use hardcoded values directly)
            # PROJECT_DIR_REMOTE=\\"$1\\" # Example if passing args
            # REPO_URL_REMOTE=\\"$2\\"   # Example if passing args

            # Using direct values inside the script for clarity as requested
            PROJECT_DIR_ON_VPS_SCRIPT=\\"$PROJECT_DIR_ON_VPS\\"
            REPO_URL_SCRIPT=\\"$REPO_URL\\" # This value comes from GHA env

            echo "Target project directory on server: \$PROJECT_DIR_ON_VPS_SCRIPT"
            echo "Repository URL for clone/pull: \$REPO_URL_SCRIPT"

            if [ -d "\$PROJECT_DIR_ON_VPS_SCRIPT" ]; then
              echo "Project directory exists. Pulling latest changes."
              cd "\$PROJECT_DIR_ON_VPS_SCRIPT"
              git checkout main
              echo "Updating remote URL to \$REPO_URL_SCRIPT ..."
              git remote set-url origin "\$REPO_URL_SCRIPT"
              echo "Pulling from origin main..."
              git pull origin main
            else
              echo "Project directory does not exist. Cloning repository."
              # Create parent directory if it doesn't exist
              mkdir -p "\$(dirname "\$PROJECT_DIR_ON_VPS_SCRIPT")"
              git clone "\$REPO_URL_SCRIPT" "\$PROJECT_DIR_ON_VPS_SCRIPT"
              cd "\$PROJECT_DIR_ON_VPS_SCRIPT"
            fi

            echo "Building and restarting services with Docker Compose..."
            # export DOCKER_BUILDKIT=1 # Uncomment if needed on your VPS for BuildKit features
            docker-compose build --no-cache # Build images, --no-cache ensures fresh builds
            docker-compose up -d --force-recreate # Restart services with new images

            echo "Cleaning up unused Docker images (optional)..."
            docker image prune -af # -a to remove all unused images, not just dangling ones; -f to force

            echo "Deployment complete!"
          \\"EOF\\"
          # Note: If passing arguments to bash -s, they would be listed after "bash -s" -- arg1 arg2 etc.
          # For this change, REPO_URL is directly expanded from GHA env, and PROJECT_DIR_ON_VPS is constructed from hardcoded values.

          echo "Cleaning up SSH key..."
          rm -f id_rsa_temp
