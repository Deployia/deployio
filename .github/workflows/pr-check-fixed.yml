name: Pull Request Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          cd client && npm ci --legacy-peer-deps
          cd ../fastapi_service && pip install -r requirements.txt

      - name: Run linting
        run: |
          npm run lint
          cd client && npm run lint
          cd ../fastapi_service && pip install black pylint && black --check . && pylint **/*.py || true

      - name: Run tests
        run: |
          npm run test || true
          cd client && npm run test -- --coverage --watchAll=false || true
          cd ../fastapi_service && pip install pytest && pytest || true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Validate Docker builds
        run: |
          docker build -t test/backend .
          docker build -t test/fastapi ./fastapi_service
          docker build -t test/frontend ./client

      - name: Security audit
        run: |
          npm audit --audit-level=moderate || true
          cd client && npm audit --audit-level=moderate || true

  size-impact:
    name: Bundle Size Impact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          cd client
          npm ci --legacy-peer-deps

      - name: Build and analyze bundle
        run: |
          cd client
          npm run build
          npx bundlesize || true

      - name: Comment bundle size
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = './client/dist';
            if (fs.existsSync(path)) {
              const stats = fs.statSync(path);
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `📦 Bundle size check completed. Build directory size: ${(stats.size / 1024 / 1024).toFixed(2)} MB`
              });
            }
