name: Deploy Platform

on:
  push:
    branches: []
    paths:
      - "ai_service/**"
      - "client/**"
      - "config/**"
      - "controllers/**"
      - "middleware/**"
      - "models/**"
      - "routes/**"
      - "services/**"
      - "templates/**"
      - "utils/**"
      - "app.js"
      - "docker-compose.yml"
      - "Dockerfile"
      - "package.json"
      - "server.js"

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  DOCKER_BUILDKIT: 1

jobs:
  deploy-production:
    name: 🚀 Deploy via AWS ECR & EC2
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Restore .env files for each service
      - name: 📝 Write frontend .env.production
        run: echo "${{ secrets.ENV_CLIENT_PROD }}" > client/.env.production

      - name: 📝 Write backend .env.production
        run: echo "${{ secrets.ENV_BACKEND_PROD }}" > .env.production

      - name: 📝 Write ai_service .env.production
        run: echo "${{ secrets.ENV_FASTAPI_PROD }}" > ai_service/.env.production

      - name: 🔐 Login to Amazon ECR
        run: |
          echo "🔐 Authenticating with Amazon ECR..."
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          echo "✅ ECR authentication successful"

      - name: 📊 ECR Repository Analysis
        run: |
          echo " Analyzing ECR Repository Usage..."
          echo "============================================"

          total_size=0
          for repo in deployio-frontend deployio-backend deployio-ai-service; do
            echo "🏗️  Repository: $repo"
            echo "----------------------------------------"
            
            # Get image details with size conversion
            images_data=$(aws ecr describe-images \
              --repository-name $repo \
              --region ${{ secrets.AWS_REGION }} \
              --query 'imageDetails[*].{Tag:imageTags[0], SizeBytes:imageSizeInBytes, Pushed:imagePushedAt}' \
              --output json 2>/dev/null || echo "[]")
            
            if [ "$images_data" != "[]" ]; then
              echo "$images_data" | jq -r '.[] | 
                "   📦 Tag: " + (.Tag // "untagged") + 
                " | Size: " + ((.SizeBytes / 1024 / 1024) | tostring | split(".")[0]) + " MB" + 
                " | Pushed: " + (.Pushed | split("T")[0])'
              
              # Calculate repository total size
              repo_size=$(echo "$images_data" | jq '[.[].SizeBytes] | add // 0')
              repo_size_mb=$((repo_size / 1024 / 1024))
              total_size=$((total_size + repo_size))
              
              echo "   📊 Repository Total: ${repo_size_mb} MB"
            else
              echo "   ⚠️  No images found in repository"
            fi
            echo ""
          done

          total_size_mb=$((total_size / 1024 / 1024))
          echo "============================================"
          echo "🎯 TOTAL ECR USAGE: ${total_size_mb} MB across all repositories"
          echo "============================================"

      - name: 🏗️ Build and Push Docker Images
        run: |
          echo "🏗️ Building Docker images with optimizations..."

          echo "📦 Building backend service..."
          docker build --compress -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/deployio-backend:latest .

          echo "📦 Building frontend service..."
          docker build --compress -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/deployio-frontend:latest ./client

          echo "📦 Building AI service..."
          docker build --compress -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/deployio-ai-service:latest ./ai_service

          echo "🚀 Pushing images to ECR..."

          echo "⬆️  Pushing backend image..."
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/deployio-backend:latest

          echo "⬆️  Pushing frontend image..."
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/deployio-frontend:latest

          echo "⬆️  Pushing AI service image..."
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/deployio-ai-service:latest

          echo "✅ All images pushed successfully!"

      - name: 🚀 Deploy on EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLATFORM_HOST}}
          username: vasudevshetty
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Starting deployment process..."
            echo "============================================"

            # Pre-deployment system check
            echo "📊 Pre-deployment system status:"
            echo "CPU Usage: $(top -bn1 | grep "Cpu(s)" | awk '{print $2}' | cut -d'%' -f1)%"
            echo "Memory Usage: $(free -m | awk 'NR==2{printf "%.1f%%\n", $3*100/$2}')"
            echo "Disk Usage: $(df -h / | awk 'NR==2{print $5}')"
            echo "============================================"

            # ECR Authentication
            echo "🔐 Authenticating with ECR..."
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            cd ~/deployio

            # Graceful shutdown
            echo "🛑 Stopping existing services..."
            docker-compose down --remove-orphans

            # Pull latest images
            echo "📥 Pulling latest Docker images..."
            docker-compose pull

            # Start services
            echo "🚀 Starting updated services..."
            docker-compose up -d --remove-orphans

            # Wait for containers to start
            echo "⏳ Waiting for services to initialize..."
            sleep 30

            # Enhanced health check
            echo "🔍 Performing comprehensive health checks..."
            for i in {1..3}; do
              echo "   Health check attempt $i/3..."
              if docker-compose ps | grep -q "Up.*healthy"; then
                echo "   ✅ Services are healthy after $((i * 10)) seconds"
                break
              else
                echo "   ⏳ Waiting for services to become healthy..."
                sleep 10
              fi
            done

            # Container status verification
            echo "============================================"
            echo "🐳 Docker Container Status:"
            docker-compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
            echo "============================================"

            # Website connectivity test
            echo "🌐 Testing website connectivity..."
            for i in {1..3}; do
              if curl -f -s -o /dev/null -w "HTTP Status: %{http_code}, Response Time: %{time_total}s\n" https://deployio.tech; then
                echo "✅ Website is responding correctly"
                break
              else
                echo "⚠️  Website test failed (attempt $i/3), retrying..."
                sleep 5
              fi
            done

            # Post-deployment resource usage
            echo "============================================"
            echo "📊 Post-deployment System Metrics:"
            echo "----------------------------------------"

            # CPU information
            cpu_usage=$(top -bn1 | grep "Cpu(s)" | awk '{print $2}' | cut -d'%' -f1)
            echo "🖥️  CPU Usage: ${cpu_usage}%"

            # Memory information  
            memory_info=$(free -m | awk 'NR==2{printf "Used: %sMB (%.1f%%) | Available: %sMB | Total: %sMB", $3, $3*100/$2, $7, $2}')
            echo "🧠 Memory: $memory_info"

            # Disk usage
            disk_usage=$(df -h / | awk 'NR==2{printf "Used: %s (%s) | Available: %s | Total: %s", $3, $5, $4, $2}')
            echo "💾 Disk: $disk_usage"

            # Load average
            load_avg=$(uptime | awk -F'load average:' '{print $2}')
            echo "⚡ Load Average:$load_avg"

            # Docker resource usage
            echo "----------------------------------------"
            echo "🐳 Docker Resource Usage:"
            docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}" | head -10

            echo "============================================"
            echo "✅ Deployment completed successfully!"
            echo "🌐 Production URL: https://deployio.tech"
            echo "============================================"
  notify:
    name: 📢 Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always()

    steps:
      - name: 📊 Deployment Summary Report
        run: |
          echo "============================================"
          echo "🎯 DEPLOYIO CI/CD PIPELINE SUMMARY"
          echo "============================================"
          echo "📅 Deployment Date: $(date -u)"
          echo "🔗 Commit SHA: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "============================================"

          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "✅ DEPLOYMENT STATUS: SUCCESS"
            echo "🎉 DeployIO has been successfully deployed!"
            echo "🌐 Production URL: https://deployio.tech"
            echo "🚀 All services are up and running"
            echo "📊 System resources have been monitored"
            echo "🔍 Health checks passed"
          elif [ "${{ needs.deploy-production.result }}" == "failure" ]; then
            echo "❌ DEPLOYMENT STATUS: FAILED"
            echo "💥 DeployIO deployment encountered errors"
            echo "🔧 Please check the deployment logs above"
            echo "⚠️  Manual intervention may be required"
          elif [ "${{ needs.deploy-production.result }}" == "cancelled" ]; then
            echo "⏹️  DEPLOYMENT STATUS: CANCELLED"
            echo "🛑 Deployment was cancelled before completion"
          else
            echo "❓ DEPLOYMENT STATUS: UNKNOWN"
            echo "🤔 Unexpected deployment result status"
          fi

          echo "============================================"
          echo "📋 Next Steps:"
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "• Monitor application performance"
            echo "• Check error logs if needed"  
            echo "• Verify all features are working"
          else
            echo "• Review deployment logs"
            echo "• Check AWS ECR and EC2 status"
            echo "• Verify environment configurations"
            echo "• Re-run deployment if necessary"
          fi
          echo "============================================"
