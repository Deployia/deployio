name: Deploy to ECR and EC2

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    name: Deploy via AWS ECR & EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Restore .env files for each service
      - name: Write frontend .env.production
        run: echo "${{ secrets.ENV_CLIENT_PROD }}" > client/.env.production

      - name: Write backend .env.production
        run: echo "${{ secrets.ENV_BACKEND_PROD }}" > .env.production

      - name: Write ai_service .env.production
        run: echo "${{ secrets.ENV_FASTAPI_PROD }}" > ai_service/.env.production

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Print ECR image usage
        run: |
          echo "🔍 Checking ECR image sizes..."
          for repo in deployio-frontend deployio-backend deployio-ai-service; do
            echo "--- $repo ---"
            aws ecr describe-images \
              --repository-name $repo \
              --region ${{ secrets.AWS_REGION }} \
              --query 'imageDetails[*].{Tag:imageTags[0], SizeMB:imageSizeInBytes}' \
              --output table
            echo ""
          done

      - name: Build and push Docker images
        run: |
          docker build -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/deployio-backend:latest .
          docker build -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/deployio-frontend:latest ./client
          docker build -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/deployio-ai-service:latest ./ai_service

          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/deployio-backend:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/deployio-frontend:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/deployio-ai-service:latest

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: deployio.tech
          username: vasudevshetty
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            cd ~/deployio
            docker-compose down --remove-orphans
            docker-compose pull
            docker-compose up -d --remove-orphans
