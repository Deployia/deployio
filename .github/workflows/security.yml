name: 🔒 Security Scanning & Analysis Pipeline

on:
  # schedule:
    # - cron: "0 2 * * *" # Daily security scan at 2 AM UTC
  push:
    branches: []
  pull_request:
    branches: []

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  security-audit:
    name: 🛡️ Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: ⚙️ Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: 📊 Environment Information
        run: |
          echo "🔍 Security Audit Environment Details"
          echo "======================================"
          echo "📅 Scan Date: $(date -u)"
          echo "🔗 Commit SHA: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "🖥️  Runner OS: $(uname -a)"
          echo "📦 Node.js: $(node --version)"
          echo "🐍 Python: $(python --version)"
          echo "======================================"

      - name: 📦 Install Dependencies
        run: |
          echo "📦 Installing backend dependencies..."
          npm ci --legacy-peer-deps

          echo "📦 Installing frontend dependencies..."
          cd client && npm ci --legacy-peer-deps

          echo "📦 Installing AI service dependencies..."
          cd ../ai_service && pip install -r requirements.txt

          echo "✅ All dependencies installed successfully"

      - name: 🔍 Node.js Security Audit
        run: |
          echo "🔍 Starting Node.js security vulnerability scan..."
          echo "=================================================="

          echo "🔎 Scanning backend dependencies..."
          backend_vulns=$(npm audit --audit-level=high --json | jq '.metadata.vulnerabilities.total // 0')
          echo "   Found: $backend_vulns vulnerabilities"
          npm audit --audit-level=high || echo "⚠️  Backend vulnerabilities detected"

          echo ""
          echo "🔎 Scanning frontend dependencies..."
          cd client
          frontend_vulns=$(npm audit --audit-level=high --json | jq '.metadata.vulnerabilities.total // 0')
          echo "   Found: $frontend_vulns vulnerabilities"
          npm audit --audit-level=high || echo "⚠️  Frontend vulnerabilities detected"

          echo "=================================================="
          echo "📊 Security Audit Summary:"
          echo "   Backend vulnerabilities: $backend_vulns"
          echo "   Frontend vulnerabilities: $frontend_vulns"
          echo "   Total vulnerabilities: $((backend_vulns + frontend_vulns))"
          echo "=================================================="
        continue-on-error: true

      - name: 🐍 Python Security Analysis
        run: |
          echo "🐍 Starting Python security analysis..."
          echo "========================================"

          echo "📦 Installing security tools..."
          pip install bandit safety

          echo "🔎 Running Bandit security linter..."
          cd ai_service
          bandit_issues=$(bandit -r . -x tests/ -f json -o ../bandit-report.json 2>/dev/null | grep -o '"issue"' | wc -l || echo "0")
          echo "   Bandit issues found: $bandit_issues"

          echo "🔎 Running Safety vulnerability checker..."
          safety_vulns=$(safety check --json --output ../safety-report.json 2>/dev/null | jq 'length // 0' || echo "0")
          echo "   Safety vulnerabilities found: $safety_vulns"

          echo "========================================"
          echo "📊 Python Security Summary:"
          echo "   Bandit security issues: $bandit_issues"
          echo "   Safety vulnerabilities: $safety_vulns"
          echo "   Total Python issues: $((bandit_issues + safety_vulns))"
          echo "========================================"
        continue-on-error: true

      - name: 📤 Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports-${{ github.run_number }}
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30
  container-security:
    name: 🐳 Container Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📊 Pre-scan System Information
        run: |
          echo "🐳 Container Security Scan Environment"
          echo "======================================"
          echo "📅 Scan Date: $(date -u)"
          echo "🔗 Commit SHA: ${{ github.sha }}"
          echo "🐳 Docker Version: $(docker --version)"
          echo "💾 Available Disk Space: $(df -h / | awk 'NR==2{print $4}')"
          echo "🧠 Available Memory: $(free -h | awk 'NR==2{print $7}')"
          echo "======================================"

      - name: 🏗️ Build Docker Images for Scanning
        run: |
          echo "🏗️ Building Docker images for security analysis..."
          echo "=================================================="

          echo "📦 Building backend image..."
          docker build -t deployio/backend:scan .
          backend_size=$(docker images deployio/backend:scan --format "table {{.Size}}" | tail -1)
          echo "   ✅ Backend image built (Size: $backend_size)"

          echo "📦 Building AI service image..."
          docker build -t deployio/ai-service:scan ./ai_service
          ai_size=$(docker images deployio/ai-service:scan --format "table {{.Size}}" | tail -1)
          echo "   ✅ AI service image built (Size: $ai_size)"

          echo "📦 Building frontend image..."
          docker build -t deployio/frontend:scan ./client
          frontend_size=$(docker images deployio/frontend:scan --format "table {{.Size}}" | tail -1)
          echo "   ✅ Frontend image built (Size: $frontend_size)"

          echo "=================================================="
          echo "📊 Image Size Summary:"
          echo "   Backend: $backend_size"
          echo "   AI Service: $ai_size"
          echo "   Frontend: $frontend_size"
          echo "=================================================="

      - name: 🔧 Install Trivy Security Scanner
        run: |
          echo "🔧 Installing Trivy security scanner..."
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.48.3
          echo "✅ Trivy $(trivy --version | head -1) installed successfully"

      - name: 🔍 Comprehensive Container Security Scan
        run: |
          echo "🔍 Starting comprehensive container security analysis..."
          echo "======================================================"

          # Backend scan
          echo "🔎 Scanning backend container..."
          trivy image --severity HIGH,CRITICAL --format json --output backend-scan.json deployio/backend:scan || true
          backend_vulns=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH" or .Severity == "CRITICAL")] | length' backend-scan.json 2>/dev/null || echo "0")
          echo "   Critical/High vulnerabilities: $backend_vulns"

          # AI service scan  
          echo "🔎 Scanning AI service container..."
          trivy image --severity HIGH,CRITICAL --format json --output ai-service-scan.json deployio/ai-service:scan || true
          ai_vulns=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH" or .Severity == "CRITICAL")] | length' ai-service-scan.json 2>/dev/null || echo "0")
          echo "   Critical/High vulnerabilities: $ai_vulns"

          # Frontend scan
          echo "🔎 Scanning frontend container..."
          trivy image --severity HIGH,CRITICAL --format json --output frontend-scan.json deployio/frontend:scan || true
          frontend_vulns=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH" or .Severity == "CRITICAL")] | length' frontend-scan.json 2>/dev/null || echo "0")
          echo "   Critical/High vulnerabilities: $frontend_vulns"

          # Summary
          total_vulns=$((backend_vulns + ai_vulns + frontend_vulns))
          echo "======================================================"
          echo "📊 Container Security Summary:"
          echo "   Backend vulnerabilities: $backend_vulns"
          echo "   AI Service vulnerabilities: $ai_vulns"
          echo "   Frontend vulnerabilities: $frontend_vulns"
          echo "   Total critical/high vulnerabilities: $total_vulns"
          echo "======================================================"

          # Set output for later steps
          echo "total_vulns=$total_vulns" >> $GITHUB_ENV

      - name: 🧹 Container Cleanup
        run: |
          echo "🧹 Cleaning up container images..."
          docker rmi deployio/backend:scan deployio/ai-service:scan deployio/frontend:scan || true
          echo "✅ Cleanup completed"

      - name: 📤 Upload Container Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: container-security-scans-${{ github.run_number }}
          path: |
            backend-scan.json
            ai-service-scan.json
            frontend-scan.json
          retention-days: 30

  secrets-scan:
    name: 🔐 Secrets & Credential Detection
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for comprehensive scanning

      - name: 📊 Secrets Scan Information
        run: |
          echo "🔐 Secrets Detection Scan"
          echo "========================="
          echo "📅 Scan Date: $(date -u)"
          echo "🔗 Commit SHA: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "📂 Repository: ${{ github.repository }}"
          echo "🔍 Scan Type: ${{ github.ref == 'refs/heads/main' && 'Full Repository Scan' || 'Differential Scan' }}"
          echo "========================="

      - name: 🔍 TruffleHog Full Repository Scan (Main Branch)
        if: github.ref == 'refs/heads/main'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified --json > trufflehog-full-report.json
        continue-on-error: true

      - name: 🔍 TruffleHog Differential Scan (PRs & Feature Branches)
        if: github.ref != 'refs/heads/main'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified --json > trufflehog-diff-report.json
        continue-on-error: true

      - name: 📊 Secrets Scan Analysis
        run: |
          echo "📊 Analyzing secrets scan results..."
          echo "===================================="

          if [ -f "trufflehog-full-report.json" ]; then
            secrets_found=$(cat trufflehog-full-report.json | wc -l)
            echo "🔍 Full scan completed"
            echo "   Potential secrets detected: $secrets_found"
          elif [ -f "trufflehog-diff-report.json" ]; then
            secrets_found=$(cat trufflehog-diff-report.json | wc -l)
            echo "🔍 Differential scan completed"
            echo "   Potential secrets detected: $secrets_found"
          else
            secrets_found=0
            echo "🔍 No scan report found"
          fi

          echo "===================================="
          echo "📊 Secrets Detection Summary:"
          echo "   Total potential secrets: $secrets_found"
          echo "   Scan mode: ${{ github.ref == 'refs/heads/main' && 'Full Repository' || 'Differential' }}"
          echo "===================================="

          if [ "$secrets_found" -gt "0" ]; then
            echo "⚠️  WARNING: Potential secrets detected!"
            echo "🔧 Please review the scan results and take appropriate action"
          else
            echo "✅ No verified secrets detected"
          fi

      - name: 📤 Upload Secrets Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-scan-results-${{ github.run_number }}
          path: |
            trufflehog-*-report.json
          retention-days: 30

  sast-analysis:
    name: 🔬 Static Application Security Testing (SAST)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📊 SAST Scan Information
        run: |
          echo "🔬 Static Application Security Testing"
          echo "======================================"
          echo "📅 Scan Date: $(date -u)"
          echo "🔗 Commit SHA: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "📂 Scanning Languages: JavaScript, TypeScript, Python"
          echo "======================================"

      - name: 🔍 CodeQL Analysis Setup
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python
          queries: security-extended

      - name: 🏗️ Autobuild for CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript,python"

      - name: 🔍 ESLint Security Analysis
        run: |
          echo "🔍 Running ESLint security analysis..."
          npm install -g eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin eslint-plugin-security

          # Backend security linting
          echo "📝 Analyzing backend JavaScript/TypeScript..."
          eslint --ext .js,.ts --format json --output-file eslint-backend-security.json . || true
          backend_issues=$(jq 'map(.messages | length) | add // 0' eslint-backend-security.json)
          echo "   Backend security issues: $backend_issues"

          # Frontend security linting
          echo "📝 Analyzing frontend React/TypeScript..."
          cd client
          eslint --ext .js,.jsx,.ts,.tsx --format json --output-file ../eslint-frontend-security.json src/ || true
          frontend_issues=$(jq 'map(.messages | length) | add // 0' ../eslint-frontend-security.json)
          echo "   Frontend security issues: $frontend_issues"

          echo "======================================"
          echo "📊 ESLint Security Summary:"
          echo "   Backend issues: $backend_issues"
          echo "   Frontend issues: $frontend_issues"
          echo "   Total issues: $((backend_issues + frontend_issues))"
          echo "======================================"

      - name: 📤 Upload SAST Results
        uses: actions/upload-artifact@v4
        with:
          name: sast-analysis-results-${{ github.run_number }}
          path: |
            eslint-*-security.json
          retention-days: 30
  security-summary:
    name: 📋 Security Scan Summary & Report
    runs-on: ubuntu-latest
    needs: [security-audit, container-security, secrets-scan, sast-analysis]
    if: always()

    steps:
      - name: 📊 Comprehensive Security Dashboard
        run: |
          echo "=============================================="
          echo "🔒 DEPLOYIO SECURITY ANALYSIS DASHBOARD"
          echo "=============================================="
          echo "📅 Scan Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "🔗 Commit SHA: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "🔄 Workflow Run: #${{ github.run_number }}"
          echo "=============================================="

          # Job status summary
          echo "📊 Security Scan Status Matrix:"
          echo "┌─────────────────────────────────────────────┐"
          echo "│ 🛡️  Dependency Security Audit:   ${{ needs.security-audit.result == 'success' && '✅ PASSED ' || '❌ FAILED ' }} │"
          echo "│ 🐳 Container Security Scanning:  ${{ needs.container-security.result == 'success' && '✅ PASSED ' || '❌ FAILED ' }} │"
          echo "│ 🔐 Secrets & Credential Detection: ${{ needs.secrets-scan.result == 'success' && '✅ PASSED ' || '❌ FAILED ' }}│"
          echo "│ 🔬 Static Application Security:  ${{ needs.sast-analysis.result == 'success' && '✅ PASSED ' || '❌ FAILED ' }} │"
          echo "└─────────────────────────────────────────────┘"

          # Calculate overall security score
          passed_jobs=0
          total_jobs=4

          if [ "${{ needs.security-audit.result }}" == "success" ]; then
            passed_jobs=$((passed_jobs + 1))
          fi
          if [ "${{ needs.container-security.result }}" == "success" ]; then
            passed_jobs=$((passed_jobs + 1))
          fi
          if [ "${{ needs.secrets-scan.result }}" == "success" ]; then
            passed_jobs=$((passed_jobs + 1))
          fi
          if [ "${{ needs.sast-analysis.result }}" == "success" ]; then
            passed_jobs=$((passed_jobs + 1))
          fi

          security_score=$((passed_jobs * 100 / total_jobs))
          failed_jobs=$((total_jobs - passed_jobs))

          echo ""
          echo "🎯 SECURITY POSTURE ASSESSMENT:"
          echo "────────────────────────────────"
          echo "📊 Security Score: $security_score% ($passed_jobs/$total_jobs tests passed)"

          if [ "$security_score" -ge "90" ]; then
            echo "🟢 Security Status: EXCELLENT"
            echo "🛡️  Your application has a strong security posture"
          elif [ "$security_score" -ge "75" ]; then
            echo "🟡 Security Status: GOOD"
            echo "⚠️  Minor security improvements recommended"
          elif [ "$security_score" -ge "50" ]; then
            echo "🟠 Security Status: NEEDS ATTENTION"
            echo "🔧 Several security issues need to be addressed"
          else
            echo "🔴 Security Status: CRITICAL"
            echo "🚨 Immediate security action required"
          fi

          echo "=============================================="
          echo "📋 Detailed Recommendations:"

          if [ "${{ needs.security-audit.result }}" != "success" ]; then
            echo "🛡️  Dependency Audit Issues:"
            echo "   • Review and update vulnerable dependencies"
            echo "   • Consider using npm audit fix or similar tools"
            echo "   • Check for available security patches"
          fi

          if [ "${{ needs.container-security.result }}" != "success" ]; then
            echo "🐳 Container Security Issues:"
            echo "   • Update base images to latest versions"
            echo "   • Review Trivy scan results for vulnerabilities"
            echo "   • Consider using distroless or minimal base images"
          fi

          if [ "${{ needs.secrets-scan.result }}" != "success" ]; then
            echo "🔐 Secrets Detection Issues:"
            echo "   • Review TruffleHog findings immediately"
            echo "   • Rotate any exposed credentials"
            echo "   • Implement proper secret management"
          fi

          if [ "${{ needs.sast-analysis.result }}" != "success" ]; then
            echo "🔬 Static Analysis Issues:"
            echo "   • Review CodeQL and ESLint security findings"
            echo "   • Fix identified code security patterns"
            echo "   • Implement secure coding practices"
          fi

          if [ "$failed_jobs" -eq "0" ]; then
            echo "✨ Maintenance Recommendations:"
            echo "   • Continue regular security scanning"
            echo "   • Keep dependencies up to date"
            echo "   • Monitor for new security advisories"
            echo "   • Review and update security policies"
          fi

          echo "=============================================="
          echo "📊 Security Metrics & Artifacts:"
          echo "   📁 Dependency audit reports available"
          echo "   📁 Container scan results available"  
          echo "   📁 Secrets detection logs available"
          echo "   📁 SAST analysis results available"
          echo "   🔗 All reports stored for 30 days"
          echo "=============================================="

          # Set step conclusion          if [ "$security_score" -ge "75" ]; then
            echo "🎉 Security scan completed successfully!"
          else
            echo "⚠️  Security scan completed with concerns"
          fi

  security-notification:
    name: 🚨 Security Alert Notification
    runs-on: ubuntu-latest
    needs:
      [
        security-audit,
        container-security,
        secrets-scan,
        sast-analysis,
        security-summary,
      ]
    if: always() && (needs.security-audit.result != 'success' || needs.container-security.result != 'success' || needs.secrets-scan.result != 'success' || needs.sast-analysis.result != 'success')

    steps:
      - name: 🚨 Critical Security Alert
        run: |
          echo "🚨 CRITICAL SECURITY ALERT"
          echo "=========================="
          echo "⚠️  One or more security scans have detected issues"
          echo "📅 Alert Time: $(date -u)"
          echo "🔗 Repository: ${{ github.repository }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "🔗 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
          echo "=========================="
          echo ""
          echo "📋 IMMEDIATE ACTIONS REQUIRED:"
          echo "1. Review security scan artifacts"
          echo "2. Address critical vulnerabilities"
          echo "3. Update vulnerable dependencies"
          echo "4. Rotate any exposed secrets"
          echo "5. Re-run security scans to verify fixes"
          echo ""
          echo "🔗 View detailed results in workflow artifacts"
          echo "=========================="
