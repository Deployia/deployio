name: CI/CD Pipeline for DeployIO

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  DOCKER_BUILDKIT: 1

jobs:
  code-quality:
    name: 🔍 Code Quality & Linting
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: ⚙️ Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: 📦 Install Node.js dependencies
        run: |
          echo "📦 Installing backend dependencies..."
          npm ci --legacy-peer-deps
          echo "📦 Installing frontend dependencies..."
          cd client && npm ci --legacy-peer-deps

      - name: 📦 Install Python dependencies
        run: |
          echo "📦 Installing AI service dependencies..."
          cd ai_service
          pip install -r requirements.txt
          pip install pylint pytest black

      - name: 🔍 Lint JavaScript/React
        run: |
          echo "🔍 Linting backend JavaScript..."
          npm run lint || true
          echo "🔍 Linting frontend React code..."
          cd client && npm run lint || true

      - name: 🔍 Lint Python
        run: |
          echo "🔍 Linting AI service Python code..."
          cd ai_service
          pylint --rcfile=.pylintrc **/*.py || true
          black --check --diff . || true
  security-scan:
    name: 🔒 Security Vulnerability Scanning
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Security audit for Node.js
        run: |
          echo "🔍 Scanning backend for security vulnerabilities..."
          npm audit --audit-level=moderate || true
          echo "🔍 Scanning frontend for security vulnerabilities..."
          cd client && npm audit --audit-level=moderate || true

      - name: 🔍 Python security scan with Bandit
        run: |
          echo "🔍 Installing security scanner..."
          pip install bandit
          echo "🔍 Scanning AI service for security issues..."
          cd ai_service
          bandit -r . -x tests/ || true

  backend-tests:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password123
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: |
          echo "📦 Installing backend dependencies..."
          npm ci --legacy-peer-deps

      - name: 🧪 Run backend tests
        run: |
          echo "🧪 Running backend test suite..."
          npm run test || true
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://admin:password123@localhost:27017/deployio_test?authSource=admin
          JWT_SECRET: test_jwt_secret_for_ci
  ai-tests:
    name: 🤖 AI Service Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          echo "📦 Installing AI service dependencies..."
          cd ai_service
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: 🧪 Run AI Service tests
        run: |
          echo "🧪 Running AI service test suite..."
          cd ai_service
          pytest tests/ -v --cov=. --cov-report=xml || true

  frontend-tests:
    name: ⚛️ Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: |
          echo "📦 Installing frontend dependencies..."
          cd client
          npm ci --legacy-peer-deps

      - name: 🧪 Run frontend tests
        run: |
          echo "🧪 Running frontend test suite..."
          cd client
          npm run test -- --coverage --watchAll=false || true
