name: 🤖 Copilot Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: |
          cd server && npm ci
          cd ../client && npm ci

      - name: Run ESLint with Copilot suggestions
        run: |
          cd client && npm run lint 2>&1 | tee ../lint-output.txt || true
          cd ../server && npm run lint 2>&1 | tee ../server-lint-output.txt || true

      - name: Architecture Review
        run: |
          echo "🏗️ Architecture Review Checklist:" > architecture-review.md
          echo "" >> architecture-review.md
          echo "- [ ] Follows modular controller pattern" >> architecture-review.md
          echo "- [ ] Uses proper service layer separation" >> architecture-review.md
          echo "- [ ] WebSocket namespaces are correctly implemented" >> architecture-review.md
          echo "- [ ] API routes follow /api/v1/ versioning" >> architecture-review.md
          echo "- [ ] Authentication middleware is properly used" >> architecture-review.md
          echo "- [ ] Design system (bg-neutral-900/50) is consistent" >> architecture-review.md
          echo "- [ ] React components follow atomic design" >> architecture-review.md
          echo "- [ ] Redux slices are feature-based" >> architecture-review.md

      - name: Security Review
        run: |
          echo "🔒 Security Review Checklist:" > security-review.md
          echo "" >> security-review.md
          echo "- [ ] No hardcoded secrets or API keys" >> security-review.md
          echo "- [ ] JWT authentication is properly implemented" >> security-review.md
          echo "- [ ] Input validation is in place" >> security-review.md
          echo "- [ ] CORS configuration is appropriate" >> security-review.md
          echo "- [ ] Rate limiting is implemented where needed" >> security-review.md

      - name: Comment PR with Review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = '## 🤖 Copilot Code Review\n\n';

            // Add architecture review
            if (fs.existsSync('architecture-review.md')) {
              const archReview = fs.readFileSync('architecture-review.md', 'utf8');
              comment += archReview + '\n\n';
            }

            // Add security review
            if (fs.existsSync('security-review.md')) {
              const secReview = fs.readFileSync('security-review.md', 'utf8');
              comment += secReview + '\n\n';
            }

            // Add lint results if any
            if (fs.existsSync('lint-output.txt')) {
              const lintOutput = fs.readFileSync('lint-output.txt', 'utf8');
              if (lintOutput.trim()) {
                comment += '### 📝 Frontend Lint Results\n\n```\n' + lintOutput + '\n```\n\n';
              }
            }

            if (fs.existsSync('server-lint-output.txt')) {
              const serverLintOutput = fs.readFileSync('server-lint-output.txt', 'utf8');
              if (serverLintOutput.trim()) {
                comment += '### 📝 Backend Lint Results\n\n```\n' + serverLintOutput + '\n```\n\n';
              }
            }

            comment += '### 🎯 Review Focus Areas\n\n';
            comment += '- **Modular Architecture**: Ensure controllers and services follow feature-based organization\n';
            comment += '- **Design Consistency**: Check for proper use of dark neutral palette and glass morphism\n';
            comment += '- **WebSocket Patterns**: Verify namespace-based routing and authentication\n';
            comment += '- **AI Service Integration**: Ensure proper async processing and error handling\n';
            comment += '- **Security**: Validate JWT implementation and input sanitization\n\n';
            comment += '---\n*This review was generated by GitHub Copilot automation*';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
